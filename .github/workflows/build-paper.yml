name: Build paper

on:
  push:
    paths:
      - 'paper/**'
      - 'figures/**.pdf'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper/civilizational-metamaterials-agi26-r3.tex
          working_directory: .
          latexmk_use_lualatex: false
          latexmk_use_xelatex: false
          args: >-
            -pdf
            -interaction=nonstopmode
            -output-directory=paper
            -bibtex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: civilizational-metamaterials-agi26-r3
          path: paper/civilizational-metamaterials-agi26-r3.pdf
          if-no-files-found: error

      - name: Attach PDF to release and refresh docs/paper.pdf
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cp paper/civilizational-metamaterials-agi26-r3.pdf docs/civilizational-metamaterials-agi26-r3.pdf
          cp paper/civilizational-metamaterials-agi26-r3.pdf docs/paper.pdf
          pip install pypdf Pillow
          python code/figures/make_preprint.py
          cp paper/preprint/civilizational-metamaterials-preprint.pdf docs/civilizational-metamaterials-preprint.pdf
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/paper.pdf
          git commit -m "chore: refresh docs/paper.pdf from tagged build ${GITHUB_REF_NAME}"
          git push

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: paper/civilizational-metamaterials-agi26-r3.pdf
