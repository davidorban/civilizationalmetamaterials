name: Figures

on:
  push:
    paths:
      - 'code/**'
      - 'figures/**.pdf'
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: code/requirements.txt

      - name: Install dependencies
        run: pip install -r code/requirements.txt

      - name: Regenerate fig02 (phase transition)
        run: |
          python code/figures/fig02_phase_transition.py \
            --out /tmp/fig02-phase-transition.pdf

      - name: Regenerate fig05 (sensitivity analysis)
        run: |
          python code/figures/fig05_sensitivity_analysis.py \
            --out /tmp/fig05-sensitivity-analysis.pdf

      - name: Upload regenerated PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: figures-regenerated
          path: /tmp/fig0*.pdf
