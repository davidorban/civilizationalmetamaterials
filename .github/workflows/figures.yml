name: Figures

on:
  push:
    paths:
      - 'code/**'
      - 'figures/**.pdf'
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: code/requirements.txt

      - name: Install dependencies
        run: pip install -r code/requirements.txt

      - name: Regenerate computational figures (fig02, fig05)
        run: |
          python code/figures/fig02_phase_transition.py   --out /tmp/fig02-phase-transition.pdf
          python code/figures/fig05_sensitivity_analysis.py --out /tmp/fig05-sensitivity-analysis.pdf

      - name: Regenerate composited figures (fig03, fig04, fig06–fig10)
        run: |
          for s in fig03_provenance_taxonomy fig04_freezing_equilibrium \
                   fig06_coordination_anisotropy fig07_trial_design \
                   fig08_trust_anchors fig09_metamaterial_analogy \
                   fig10_synthetic_principals; do
            python code/figures/${s}.py --out /tmp/${s/-/_}.pdf || true
          done

      - name: Upload regenerated PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: figures-regenerated
          path: /tmp/fig*.pdf
