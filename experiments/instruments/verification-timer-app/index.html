<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Timer — Civilizational Metamaterials</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 32px 40px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    h1 { font-size: 1.2rem; margin-bottom: 6px; }
    .subtitle { color: #555; font-size: 0.85rem; margin-bottom: 28px; }

    .timer-display {
      font-size: 4rem;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin: 16px 0;
      color: #1B4F72;
    }

    .state-label {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 24px;
      min-height: 1.4em;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid #d0d7de;
      background: #fff;
      transition: background 0.1s;
    }

    #btn-start  { background: #1B4F72; color: #fff; border-color: #1B4F72; }
    #btn-stop   { background: #C0392B; color: #fff; border-color: #C0392B; display: none; }
    #btn-reset  { background: #fff; color: #555; }
    #btn-export { background: #1E8449; color: #fff; border-color: #1E8449; }

    .log {
      margin-top: 28px;
      text-align: left;
    }

    .log h2 { font-size: 0.9rem; margin-bottom: 8px; color: #555; }

    #log-list {
      list-style: none;
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      background: #f6f8fa;
      padding: 8px;
      font-size: 0.82rem;
      font-family: monospace;
    }

    #log-list li { padding: 2px 0; border-bottom: 1px solid #e8eaed; }
    #log-list li:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verification Timer</h1>
    <p class="subtitle">
      Measure τ — time spent verifying an AI-generated decision summary.
      Press Start when you begin reading; Stop when you reach your verdict.
    </p>

    <div class="timer-display" id="display">00:00.0</div>
    <div class="state-label" id="state-label">Ready</div>

    <div class="btn-row">
      <button id="btn-start"  onclick="startTimer()">Start</button>
      <button id="btn-stop"   onclick="stopTimer()">Stop</button>
      <button id="btn-reset"  onclick="resetTimer()">Reset</button>
      <button id="btn-export" onclick="exportCSV()">Export CSV</button>
    </div>

    <div class="log">
      <h2>Session log</h2>
      <ul id="log-list"></ul>
    </div>
  </div>

  <script>
  var startTime = null;
  var elapsed   = 0;
  var running   = false;
  var raf       = null;
  var session   = [];
  var item      = 1;

  function fmt(ms) {
    var s = Math.floor(ms / 1000);
    var m = Math.floor(s / 60);
    var ds = Math.floor((ms % 1000) / 100);
    return (m < 10 ? '0' : '') + m + ':' +
           ((s % 60) < 10 ? '0' : '') + (s % 60) + '.' + ds;
  }

  function tick() {
    elapsed = Date.now() - startTime;
    document.getElementById('display').textContent = fmt(elapsed);
    raf = requestAnimationFrame(tick);
  }

  function startTimer() {
    if (running) return;
    startTime = Date.now() - elapsed;
    running = true;
    raf = requestAnimationFrame(tick);
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display  = 'inline-block';
    document.getElementById('state-label').textContent = 'Verifying item ' + item + '…';
  }

  function stopTimer() {
    if (!running) return;
    cancelAnimationFrame(raf);
    running = false;
    var secs = elapsed / 1000;
    var ts   = new Date().toISOString();
    session.push({ item: item, seconds: secs.toFixed(2), timestamp: ts });
    var li = document.createElement('li');
    li.textContent = 'Item ' + item + ': ' + secs.toFixed(2) + ' s  (' + ts + ')';
    document.getElementById('log-list').appendChild(li);
    document.getElementById('state-label').textContent =
      'Item ' + item + ' — ' + secs.toFixed(2) + ' s';
    item++;
    elapsed = 0;
    document.getElementById('display').textContent = '00:00.0';
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display  = 'none';
  }

  function resetTimer() {
    cancelAnimationFrame(raf);
    running = false;
    elapsed = 0;
    document.getElementById('display').textContent = '00:00.0';
    document.getElementById('state-label').textContent = 'Ready';
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display  = 'none';
  }

  function exportCSV() {
    if (session.length === 0) { alert('No data to export.'); return; }
    var rows = ['item,seconds,timestamp'];
    session.forEach(function(r) {
      rows.push(r.item + ',' + r.seconds + ',' + r.timestamp);
    });
    var blob = new Blob([rows.join('\n')], { type: 'text/csv' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'verification-times-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
  }
  </script>
</body>
</html>
